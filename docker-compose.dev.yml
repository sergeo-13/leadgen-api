version: '3.8'

services:
  leadgen-api-dev:
    image: ghcr.io/sergeo-13/leadgen-api:dev
    container_name: leadgen-api-dev
    restart: unless-stopped
    ports:
      - "3001:8000"
    environment:
      POSTGRES_HOST: leadgen-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: leadgen
      POSTGRES_USER: leadgen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: leadgen-docs
      MINIO_SECURE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    networks:
      - leadgen_net

networks:
  leadgen_net:
    external: true
